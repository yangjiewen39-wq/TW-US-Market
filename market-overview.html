<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>盤況總覽</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2330;
    --border: #21262d;
    --text: #e6edf3;
    --muted: #7d8590;
    --up: #3fb950;
    --down: #f85149;
    --flat: #7d8590;
    --accent: #58a6ff;
    --gold: #d29922;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    font-size: 14px;
    min-height: 100vh;
    padding-bottom: 32px;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 16px 12px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
  }

  header h1 {
    font-size: 17px;
    font-weight: 600;
    letter-spacing: 0.3px;
  }

  .update-time {
    font-size: 11px;
    color: var(--muted);
  }

  .refresh-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
    transition: background 0.15s;
  }
  .refresh-btn:active { background: var(--border); }
  .spin { display: inline-block; }
  .spinning { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  section {
    padding: 16px 12px 4px;
  }

  .section-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
    padding-left: 4px;
  }

  .cards {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 12px 10px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    border-radius: 3px 0 0 3px;
    background: var(--flat);
    transition: background 0.3s;
  }
  .card.up::before { background: var(--up); }
  .card.down::before { background: var(--down); }

  .card-name {
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card-code {
    font-size: 10px;
    color: var(--border);
    display: none;
  }
  .card-price {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
    line-height: 1.1;
    margin: 4px 0 2px;
  }
  .card-price.loading {
    font-size: 14px;
    color: var(--muted);
    font-weight: 400;
    animation: pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .card-change {
    font-size: 12px;
    font-weight: 500;
  }
  .up-color { color: var(--up); }
  .down-color { color: var(--down); }
  .flat-color { color: var(--muted); }

  .card-extra {
    font-size: 10px;
    color: var(--muted);
    margin-top: 3px;
  }

  /* VIX special wide card */
  .card.wide {
    grid-column: span 2;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .card.wide .card-left {}
  .card.wide .vix-meter {
    flex: 1;
    margin-left: 16px;
  }
  .vix-bar-bg {
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
    margin-top: 4px;
  }
  .vix-bar-fill {
    height: 100%;
    border-radius: 3px;
    background: linear-gradient(90deg, var(--up), var(--gold), var(--down));
    transition: width 0.5s ease;
  }
  .vix-labels {
    display: flex;
    justify-content: space-between;
    font-size: 9px;
    color: var(--muted);
    margin-top: 2px;
  }
  .vix-zone {
    font-size: 10px;
    font-weight: 600;
    margin-top: 2px;
  }

  .error-msg {
    font-size: 10px;
    color: var(--down);
  }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 4px 12px;
    opacity: 0.5;
  }

  .footer {
    text-align: center;
    font-size: 10px;
    color: var(--muted);
    padding: 20px 12px 0;
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>📊 盤況總覽</h1>
    <div class="update-time" id="update-time">－</div>
  </div>
  <button class="refresh-btn" onclick="fetchAll()">
    <span class="spin" id="spin-icon">↻</span> 更新
  </button>
</header>

<!-- 台灣 -->
<section>
  <div class="section-label">🇹🇼 台灣</div>
  <div class="cards">
    <div class="card" id="card-taiex">
      <div class="card-name">台股大盤</div>
      <div class="card-price loading" id="price-taiex">載入中</div>
      <div class="card-change" id="change-taiex">－</div>
    </div>
    <div class="card" id="card-futures">
      <div class="card-name">台指期</div>
      <div class="card-price loading" id="price-futures">載入中</div>
      <div class="card-change" id="change-futures">－</div>
    </div>
    <div class="card" id="card-0050">
      <div class="card-name">0050 元大台灣50</div>
      <div class="card-price loading" id="price-0050">載入中</div>
      <div class="card-change" id="change-0050">－</div>
    </div>
    <div class="card" id="card-00631L">
      <div class="card-name">00631L 元大台灣50正2</div>
      <div class="card-price loading" id="price-00631L">載入中</div>
      <div class="card-change" id="change-00631L">－</div>
    </div>
    <div class="card" id="card-00981A">
      <div class="card-name">00981A 期元大S&P500</div>
      <div class="card-price loading" id="price-00981A">載入中</div>
      <div class="card-change" id="change-00981A">－</div>
    </div>
    <div class="card" id="card-00403A">
      <div class="card-name">00403A 期元大費城半導體</div>
      <div class="card-price loading" id="price-00403A">載入中</div>
      <div class="card-change" id="change-00403A">－</div>
    </div>
  </div>
</section>

<div class="divider"></div>

<!-- 美國 -->
<section>
  <div class="section-label">🇺🇸 美國</div>
  <div class="cards">
    <div class="card" id="card-sp500">
      <div class="card-name">S&P 500</div>
      <div class="card-price loading" id="price-sp500">載入中</div>
      <div class="card-change" id="change-sp500">－</div>
    </div>
    <div class="card" id="card-sox">
      <div class="card-name">費城半導體 SOX</div>
      <div class="card-price loading" id="price-sox">載入中</div>
      <div class="card-change" id="change-sox">－</div>
    </div>
    <div class="card" id="card-nasdaq">
      <div class="card-name">NASDAQ</div>
      <div class="card-price loading" id="price-nasdaq">載入中</div>
      <div class="card-change" id="change-nasdaq">－</div>
    </div>
    <div class="card wide" id="card-vix">
      <div class="card-left">
        <div class="card-name">恐慌指數 VIX</div>
        <div class="card-price loading" id="price-vix">載入中</div>
        <div class="card-change" id="change-vix">－</div>
      </div>
      <div class="vix-meter" id="vix-meter" style="display:none">
        <div class="vix-bar-bg"><div class="vix-bar-fill" id="vix-fill" style="width:0%"></div></div>
        <div class="vix-labels"><span>低恐慌 12</span><span>正常 20</span><span>高恐慌 40+</span></div>
        <div class="vix-zone" id="vix-zone"></div>
      </div>
    </div>
  </div>
</section>

<div class="footer">資料來源：Yahoo Finance｜非即時報價，僅供參考</div>

<script>
const SYMBOLS = {
  taiex:   { sym: '^TWII',     fmt: 'index' },
  futures: { sym: 'TWF=F',     fmt: 'index' },
  '0050':  { sym: '0050.TW',   fmt: 'stock' },
  '00631L':{ sym: '00631L.TW', fmt: 'stock' },
  '00981A':{ sym: '00981A.TWO',fmt: 'stock' },
  '00403A':{ sym: '00403A.TWO',fmt: 'stock' },
  sp500:   { sym: '^GSPC',     fmt: 'index' },
  sox:     { sym: '^SOX',      fmt: 'index' },
  nasdaq:  { sym: '^IXIC',     fmt: 'index' },
  vix:     { sym: '^VIX',      fmt: 'vix'   },
};

function fmtNum(n, fmt) {
  if (fmt === 'stock') return n.toFixed(2);
  if (fmt === 'vix')   return n.toFixed(2);
  if (n >= 1000)       return n.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
  return n.toFixed(2);
}

// Try multiple CORS proxies in order
const PROXIES = [
  sym => `https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(sym)}?interval=1d&range=2d`,
  sym => `https://query2.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(sym)}?interval=1d&range=2d`,
  sym => `https://corsproxy.io/?url=${encodeURIComponent('https://query1.finance.yahoo.com/v8/finance/chart/' + encodeURIComponent(sym) + '?interval=1d&range=2d')}`,
  sym => `https://api.allorigins.win/get?url=${encodeURIComponent('https://query1.finance.yahoo.com/v8/finance/chart/' + encodeURIComponent(sym) + '?interval=1d&range=2d')}`,
];

async function fetchQuote(sym) {
  let lastErr;
  for (const proxyFn of PROXIES) {
    try {
      const url = proxyFn(sym);
      const r = await fetch(url, { signal: AbortSignal.timeout(8000) });
      if (!r.ok) throw new Error('HTTP ' + r.status);
      let raw = await r.json();
      // allorigins wraps in { contents: "..." }
      if (raw.contents) raw = JSON.parse(raw.contents);
      const meta = raw.chart.result[0].meta;
      const price = meta.regularMarketPrice;
      const prev  = meta.chartPreviousClose || meta.previousClose;
      if (!price) throw new Error('no price');
      return { price, prev, change: price - prev, pct: (price - prev) / prev * 100 };
    } catch(e) {
      lastErr = e;
    }
  }
  throw lastErr;
}

function setCard(key, data, fmt) {
  const card   = document.getElementById('card-' + key);
  const priceEl= document.getElementById('price-' + key);
  const changeEl= document.getElementById('change-' + key);

  priceEl.classList.remove('loading');

  if (!data) {
    priceEl.textContent = '－';
    changeEl.textContent = '無法載入';
    changeEl.className = 'card-change flat-color';
    return;
  }

  const { price, change, pct } = data;
  const dir = change > 0 ? 'up' : change < 0 ? 'down' : 'flat';
  const sign = change > 0 ? '+' : '';

  card.className = 'card' + (key === 'vix' ? ' wide' : '') + ' ' + dir;
  priceEl.textContent = fmtNum(price, fmt);
  changeEl.textContent = `${sign}${fmtNum(change, fmt)}  ${sign}${pct.toFixed(2)}%`;
  changeEl.className = 'card-change ' + dir + '-color';

  // VIX special
  if (key === 'vix') {
    const meter = document.getElementById('vix-meter');
    meter.style.display = 'block';
    const pct_fill = Math.min((price - 10) / 45 * 100, 100);
    document.getElementById('vix-fill').style.width = pct_fill + '%';
    const zoneEl = document.getElementById('vix-zone');
    if      (price < 15) { zoneEl.textContent = '😴 低恐慌'; zoneEl.style.color = 'var(--up)'; }
    else if (price < 20) { zoneEl.textContent = '😌 正常';   zoneEl.style.color = 'var(--up)'; }
    else if (price < 30) { zoneEl.textContent = '😟 警戒';   zoneEl.style.color = 'var(--gold)'; }
    else                 { zoneEl.textContent = '😱 極度恐慌'; zoneEl.style.color = 'var(--down)'; }
  }
}

let fetching = false;
async function fetchAll() {
  if (fetching) return;
  fetching = true;
  document.getElementById('spin-icon').classList.add('spinning');

  // Reset to loading
  Object.keys(SYMBOLS).forEach(k => {
    document.getElementById('price-' + k).classList.add('loading');
    document.getElementById('price-' + k).textContent = '載入中';
    document.getElementById('change-' + k).textContent = '－';
    document.getElementById('card-' + k).className = 'card' + (k === 'vix' ? ' wide' : '');
  });

  await Promise.all(Object.entries(SYMBOLS).map(async ([key, info]) => {
    try {
      const data = await fetchQuote(info.sym);
      setCard(key, data, info.fmt);
    } catch(e) {
      setCard(key, null, info.fmt);
      console.error(key, e);
    }
  }));

  const now = new Date();
  document.getElementById('update-time').textContent =
    '更新：' + now.toLocaleTimeString('zh-TW', {hour:'2-digit', minute:'2-digit', second:'2-digit'});

  document.getElementById('spin-icon').classList.remove('spinning');
  fetching = false;
}

fetchAll();
</script>
</body>
</html>
