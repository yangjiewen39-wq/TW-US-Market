<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>盤況總覽</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2330;
    --border: #21262d;
    --text: #e6edf3;
    --muted: #7d8590;
    --up: #3fb950;
    --down: #f85149;
    --flat: #7d8590;
    --accent: #58a6ff;
    --gold: #d29922;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    font-size: 14px;
    min-height: 100vh;
    padding-bottom: 40px;
  }
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 16px 12px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
  }
  header h1 { font-size: 17px; font-weight: 600; }
  .update-time { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .refresh-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 13px;
    cursor: pointer;
    display: flex; align-items: center; gap: 5px;
  }
  .refresh-btn:active { background: var(--border); }
  .spinning { animation: spin 1s linear infinite; display:inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  section { padding: 16px 12px 4px; }
  .section-label {
    font-size: 11px; font-weight: 600; letter-spacing: 1.2px;
    text-transform: uppercase; color: var(--muted);
    margin-bottom: 10px; padding-left: 4px;
  }
  .cards { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 12px 10px;
    position: relative; overflow: hidden;
    cursor: pointer;
    transition: border-color 0.2s, transform 0.1s;
  }
  .card:active { transform: scale(0.97); }
  .card::before {
    content: '';
    position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
    border-radius: 3px 0 0 3px;
    background: var(--flat); transition: background 0.3s;
  }
  .card.up::before { background: var(--up); }
  .card.down::before { background: var(--down); }
  .card.up { border-color: rgba(63,185,80,0.2); }
  .card.down { border-color: rgba(248,81,73,0.2); }

  .card-name { font-size: 11px; color: var(--muted); margin-bottom: 2px; }
  .card-price {
    font-size: 22px; font-weight: 700; letter-spacing: -0.5px;
    line-height: 1.1; margin: 4px 0 2px;
  }
  .card-price.loading {
    font-size: 14px; color: var(--muted); font-weight: 400;
    animation: pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .card-change { font-size: 12px; font-weight: 500; }
  .up-color { color: var(--up); }
  .down-color { color: var(--down); }
  .flat-color { color: var(--muted); }

  /* VIX wide */
  .card.wide { grid-column: span 2; display: flex; align-items: center; justify-content: space-between; }
  .vix-meter { flex: 1; margin-left: 16px; }
  .vix-bar-bg { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; margin-top: 4px; }
  .vix-bar-fill {
    height: 100%; border-radius: 3px;
    background: linear-gradient(90deg, var(--up), var(--gold), var(--down));
    transition: width 0.5s ease;
  }
  .vix-labels { display: flex; justify-content: space-between; font-size: 9px; color: var(--muted); margin-top: 2px; }
  .vix-zone { font-size: 10px; font-weight: 600; margin-top: 2px; }

  /* Detail panel */
  .detail-panel {
    display: none;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-top: 8px;
    overflow: hidden;
  }
  .detail-panel.open { display: block; }
  .detail-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
  }
  .tab-btn {
    flex: 1; padding: 10px 4px; font-size: 12px; font-weight: 500;
    color: var(--muted); background: none; border: none; cursor: pointer;
    border-bottom: 2px solid transparent; transition: all 0.15s;
  }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* Chart */
  .chart-wrap { width: 100%; height: 300px; }
  .chart-wrap iframe { width: 100%; height: 100%; border: none; }

  /* News */
  .news-list { padding: 8px 12px 12px; }
  .news-item {
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    text-decoration: none;
    display: block;
    color: var(--text);
  }
  .news-item:last-child { border-bottom: none; }
  .news-title { font-size: 13px; line-height: 1.4; margin-bottom: 4px; }
  .news-meta { font-size: 10px; color: var(--muted); }
  .news-loading { padding: 20px; text-align: center; color: var(--muted); font-size: 12px; }

  .divider { height: 1px; background: var(--border); margin: 4px 12px; opacity: 0.5; }
  .footer { text-align: center; font-size: 10px; color: var(--muted); padding: 20px 12px 0; }

  .card-arrow {
    position: absolute; right: 10px; top: 12px;
    font-size: 10px; color: var(--muted); transition: transform 0.2s;
  }
  .card.expanded .card-arrow { transform: rotate(180deg); }
</style>
</head>

<script>
const SYMBOLS = {
  taiex:   { sym: '^TWII',      fmt: 'index', newsQ: '台股 大盤' },
  futures: { sym: 'IX0126.TW',  fmt: 'index', newsQ: '台指期' },
  '0050':  { sym: '0050.TW',    fmt: 'stock', newsQ: '0050 ETF' },
  '00631L':{ sym: '00631L.TW',  fmt: 'stock', newsQ: '00631L 正2' },
  sp500:   { sym: '^GSPC',      fmt: 'index', newsQ: 'S&P 500' },
  sox:     { sym: '^SOX',       fmt: 'index', newsQ: '費城半導體 SOX' },
  nasdaq:  { sym: '^IXIC',      fmt: 'index', newsQ: 'NASDAQ' },
  vix:     { sym: '^VIX',       fmt: 'vix',   newsQ: 'VIX 恐慌指數' },
};

function fmtNum(n, fmt) {
  if (fmt === 'stock' || fmt === 'vix') return n.toFixed(2);
  if (n >= 1000) return n.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
  return n.toFixed(2);
}

const PROXIES = [
  sym => `https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(sym)}?interval=1d&range=2d`,
  sym => `https://query2.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(sym)}?interval=1d&range=2d`,
  sym => `https://corsproxy.io/?url=${encodeURIComponent('https://query1.finance.yahoo.com/v8/finance/chart/'+encodeURIComponent(sym)+'?interval=1d&range=2d')}`,
  sym => `https://api.allorigins.win/get?url=${encodeURIComponent('https://query1.finance.yahoo.com/v8/finance/chart/'+encodeURIComponent(sym)+'?interval=1d&range=2d')}`,
];

async function fetchQuote(sym) {
  let lastErr;
  for (const fn of PROXIES) {
    try {
      const r = await fetch(fn(sym), { signal: AbortSignal.timeout(8000) });
      if (!r.ok) throw new Error('HTTP '+r.status);
      let raw = await r.json();
      if (raw.contents) raw = JSON.parse(raw.contents);
      const meta = raw.chart.result[0].meta;
      const price = meta.regularMarketPrice;
      const prev  = meta.chartPreviousClose || meta.previousClose;
      if (!price) throw new Error('no price');
      return { price, change: price-prev, pct: (price-prev)/prev*100 };
    } catch(e) { lastErr = e; }
  }
  throw lastErr;
}

function setCard(key, data, fmt) {
  const card    = document.getElementById('card-'+key);
  const priceEl = document.getElementById('price-'+key);
  const changeEl= document.getElementById('change-'+key);
  priceEl.classList.remove('loading');
  if (!data) {
    priceEl.textContent = '－';
    changeEl.textContent = '無法載入';
    changeEl.className = 'card-change flat-color';
    return;
  }
  const { price, change, pct } = data;
  const dir  = change > 0 ? 'up' : change < 0 ? 'down' : 'flat';
  const sign = change > 0 ? '+' : '';
  const isWide = key === 'vix';
  card.className = 'card' + (isWide ? ' wide' : '') + ' ' + dir;
  priceEl.textContent = fmtNum(price, fmt);
  changeEl.textContent = `${sign}${fmtNum(change,fmt)}  ${sign}${pct.toFixed(2)}%`;
  changeEl.className = 'card-change '+dir+'-color';
  if (key === 'vix') {
    document.getElementById('vix-meter').style.display = 'block';
    document.getElementById('vix-fill').style.width = Math.min((price-10)/45*100,100)+'%';
    const z = document.getElementById('vix-zone');
    if      (price < 15) { z.textContent='😴 低恐慌'; z.style.color='var(--up)'; }
    else if (price < 20) { z.textContent='😌 正常';   z.style.color='var(--up)'; }
    else if (price < 30) { z.textContent='😟 警戒';   z.style.color='var(--gold)'; }
    else                 { z.textContent='😱 極度恐慌'; z.style.color='var(--down)'; }
  }
}

// Detail panel toggle
const openPanels = {};
const loadedNews = {};

function toggleDetail(key) {
  const panel = document.getElementById('detail-'+key);
  const card  = document.getElementById('card-'+key);
  const arrow = document.getElementById('arrow-'+key);
  if (!panel) return;
  const isOpen = panel.classList.contains('open');
  panel.classList.toggle('open', !isOpen);
  card.classList.toggle('expanded', !isOpen);
  if (!isOpen && !loadedNews[key]) {
    loadNews(key);
  }
}

function switchTab(key, tab) {
  const chartTab = document.getElementById('tab-'+key+'-chart');
  const newsTab  = document.getElementById('tab-'+key+'-news');
  const btns = document.querySelectorAll('#detail-'+key+' .tab-btn');
  chartTab.classList.toggle('active', tab === 'chart');
  newsTab.classList.toggle('active',  tab === 'news');
  btns[0].classList.toggle('active', tab === 'chart');
  btns[1].classList.toggle('active', tab === 'news');
  if (tab === 'news' && !loadedNews[key]) loadNews(key);
}

// News via allorigins + Yahoo Finance RSS
async function loadNews(key) {
  loadedNews[key] = true;
  const q = SYMBOLS[key].newsQ;
  const rssUrl = `https://news.yahoo.com/rss/search?p=${encodeURIComponent(q)}&lang=zh-TW&region=TW`;
  const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(rssUrl)}`;
  const el = document.getElementById('news-'+key);
  try {
    const r = await fetch(proxyUrl, { signal: AbortSignal.timeout(10000) });
    const d = await r.json();
    const xml = new DOMParser().parseFromString(d.contents, 'text/xml');
    const items = Array.from(xml.querySelectorAll('item')).slice(0, 6);
    if (items.length === 0) throw new Error('empty');
    el.innerHTML = items.map(item => {
      const title = item.querySelector('title')?.textContent || '';
      const link  = item.querySelector('link')?.textContent || '#';
      const pub   = item.querySelector('pubDate')?.textContent || '';
      const date  = pub ? new Date(pub).toLocaleString('zh-TW', {month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}) : '';
      const src   = item.querySelector('source')?.textContent || '';
      return `<a class="news-item" href="${link}" target="_blank">
        <div class="news-title">${title}</div>
        <div class="news-meta">${src}${date ? ' · '+date : ''}</div>
      </a>`;
    }).join('');
  } catch(e) {
    el.innerHTML = `<div class="news-loading">新聞載入失敗，<a href="https://news.yahoo.com/search?p=${encodeURIComponent(q)}" target="_blank" style="color:var(--accent)">點此搜尋</a></div>`;
  }
}

let fetching = false;
async function fetchAll() {
  if (fetching) return;
  fetching = true;
  const icon = document.getElementById('spin-icon');
  icon.classList.add('spinning');
  Object.keys(SYMBOLS).forEach(k => {
    const p = document.getElementById('price-'+k);
    p.classList.add('loading'); p.textContent = '載入中';
    document.getElementById('change-'+k).textContent = '－';
    const c = document.getElementById('card-'+k);
    const isWide = k === 'vix';
    c.className = 'card' + (isWide ? ' wide' : '');
  });
  await Promise.all(Object.entries(SYMBOLS).map(async ([key, info]) => {
    try {
      const data = await fetchQuote(info.sym);
      setCard(key, data, info.fmt);
    } catch(e) {
      setCard(key, null, info.fmt);
    }
  }));
  const now = new Date();
  document.getElementById('update-time').textContent =
    '更新：'+now.toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  icon.classList.remove('spinning');
  fetching = false;
}

// TradingView symbols map
const TV_SYMBOLS = {
  taiex:   { sym: 'TWSE:TAIEX',    tz: 'Asia/Taipei' },
  futures: { sym: 'TAIFEX:TXF1!',  tz: 'Asia/Taipei' },
  '0050':  { sym: 'TWSE:0050',      tz: 'Asia/Taipei' },
  '00631L':{ sym: 'TWSE:00631L',    tz: 'Asia/Taipei' },
  sp500:   { sym: 'SP:SPX',         tz: 'America/New_York' },
  sox:     { sym: 'NASDAQ:SOX',     tz: 'America/New_York' },
  nasdaq:  { sym: 'NASDAQ:NDX',     tz: 'America/New_York' },
  vix:     { sym: 'CBOE:VIX',       tz: 'America/New_York' },
};

const loadedCharts = {};

function loadChart(key) {
  if (loadedCharts[key]) return;
  loadedCharts[key] = true;
  const container = document.getElementById('tv-container-' + key);
  if (!container) return;
  const info = TV_SYMBOLS[key];
  if (!info) return;

  const script = document.createElement('script');
  script.src = 'https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js';
  script.async = true;
  script.innerHTML = JSON.stringify({
    autosize: true,
    symbol: info.sym,
    interval: 'D',
    timezone: info.tz,
    theme: 'dark',
    style: '1',
    locale: 'zh_TW',
    withdateranges: true,
    hide_side_toolbar: true,
    allow_symbol_change: false,
    save_image: false,
    calendar: false,
    hide_top_toolbar: false,
    support_host: 'https://www.tradingview.com'
  });

  const wrapper = document.createElement('div');
  wrapper.className = 'tradingview-widget-container';
  wrapper.style.height = '100%';
  wrapper.style.width = '100%';
  const inner = document.createElement('div');
  inner.className = 'tradingview-widget-container__widget';
  inner.style.height = '100%';
  inner.style.width = '100%';
  wrapper.appendChild(inner);
  wrapper.appendChild(script);
  container.appendChild(wrapper);
}

// Patch toggleDetail to also load chart
const _origToggle = toggleDetail;
function toggleDetail(key) {
  _origToggle(key);
  const panel = document.getElementById('detail-' + key);
  if (panel && panel.classList.contains('open')) {
    loadChart(key);
  }
}

// Patch switchTab to load chart when switching to chart tab
const _origSwitch = switchTab;
function switchTab(key, tab) {
  _origSwitch(key, tab);
  if (tab === 'chart') loadChart(key);
}

fetchAll();
</script>
